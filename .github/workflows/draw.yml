name: Draw Keymap
on:
  workflow_dispatch:
  push:
    paths:
      - "zmk-sofle/config/keymaps/**"
      - "zmk-sofle/.github/workflows/draw.yml"
      - "zmk-sofle/keymap_drawer.config.yaml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      install_dependencies: true
      config_path: "zmk-sofle/keymap_drawer.config.yaml"
      keymap_patterns: "zmk-sofle/config/keymaps/*.keymap"
      output_folder: "zmk-sofle/keymap-drawer"
      commit_message: "[Draw] ${{ github.event.head_commit.message }}"
      destination: "commit"
      fail_on_error: ${{ fromJSON(true) }}
